<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CENGİZ LIFE İNŞAAT</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

.logo{
width:160px;
}

h1{
color:gold;
margin-top:10px;
}

/* DURUM */

.project-status{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.sold{
border:2px solid red;
color:red;
padding:10px 20px;
border-radius:10px;
}

.coming{
border:2px solid gold;
color:gold;
padding:10px 20px;
border-radius:10px;
}

/* SLIDER */

.slider{
width:100%;
overflow:hidden;
margin-top:40px;
}

.slides{
display:flex;
animation:slide 15s infinite;
}

.slides img{
width:100%;
height:300px;
object-fit:cover;
}

@keyframes slide{

0%{transform:translateX(0)}

33%{transform:translateX(-100%)}

66%{transform:translateX(-200%)}

}

/* GALERİ */

.gallery{
padding:40px 20px;
}

.gallery h2{
color:gold;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.gallery-grid img{
width:100%;
border-radius:10px;
}

/* HARITA */

.map{
margin:40px 0;
}

iframe{
width:90%;
height:300px;
border:0;
border-radius:10px;
}

/* BUTTONLAR */

.buttons{
margin:30px 0;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.whatsapp{
background:#25D366;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

.phone{
background:gold;
color:black;
}

/* FOOTER */

footer{
margin-top:40px;
padding:20px;
background:#111;
color:#aaa;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>CENGİZ LIFE İNŞAAT</h1>

<div class="project-status">

<div class="sold">
Bu projedeki dairelerimizin tamamı satılmıştır
</div>

<div class="coming">
Yeni çıkacak projelerimiz için beklemede kalın
</div>

</div>

</header>

<!-- SLIDER -->

<div class="slider">

<div class="slides">

<img src="bina1.jpg">
<img src="bina2.jpg">
<img src="bina3.jpg">

</div>

</div>

<!-- GALERİ -->

<div class="gallery">

<h2>PROJE FOTOĞRAFLARI</h2>

<div class="gallery-grid">

<img src="bina1.jpg">
<img src="bina2.jpg">
<img src="bina3.jpg">
<img src="bina4.jpg">

</div>

</div>

<!-- HARİTA -->

<div class="map">

<h2 style="color:gold">KONUM</h2>

<iframe
src="https://www.google.com/maps?q=istanbul&output=embed">
</iframe>

</div>

<!-- BUTONLAR -->

<div class="buttons">

<a class="btn whatsapp" href="https://wa.me/905000000000">
WhatsApp
</a>

<a class="btn instagram" href="#">
Instagram
</a>

<a class="btn phone" href="tel:+905000000000">
Telefon
</a>

</div>

<footer>

© 2025 CENGİZ LIFE İNŞAAT  
Tüm hakları saklıdır.

</footer>

</body>
</html>
