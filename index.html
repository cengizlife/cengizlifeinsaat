<!DOCTYPE html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cengiz Life İnşaat</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* HEADER */

header{
padding:40px 20px;
}

.logo{
width:170px;
}

h1{
color:gold;
margin-top:10px;
}

/* DURUM */

.status{
margin-top:30px;
}

.sold{
border:2px solid red;
color:red;
padding:15px;
margin:15px auto;
width:85%;
border-radius:15px;
font-size:18px;
}

.new{
border:2px solid gold;
color:gold;
padding:15px;
margin:15px auto;
width:85%;
border-radius:15px;
font-size:18px;
}

/* SLIDER */

.slider{
width:100%;
overflow:hidden;
margin-top:40px;
}

.slides{
display:flex;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:300px;
object-fit:cover;
}

@keyframes slide{

0%{transform:translateX(0)}

33%{transform:translateX(-100%)}

66%{transform:translateX(-200%)}

}

/* GALERİ */

.gallery{
margin-top:60px;
}

.gallery h2{
color:gold;
font-size:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.grid img{
width:100%;
border-radius:10px;
border:2px solid gold;
}

/* BUTONLAR */

.buttons{
margin-top:40px;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.whatsapp{
background:#25D366;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

.phone{
background:gold;
color:black;
}

/* SABİT WHATSAPP */

.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
font-size:18px;
text-decoration:none;
}

/* HARİTA */

.map{
margin-top:50px;
}

iframe{
width:90%;
height:300px;
border-radius:10px;
border:0;
}

/* FOOTER */

footer{
margin-top:50px;
padding:25px;
background:#111;
color:#aaa;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

</div>

</div>
